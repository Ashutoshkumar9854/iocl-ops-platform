app = 'iocl-backend'
primary_region = 'sin'        # Singapore — closest to India

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3001'
  NODE_ENV = 'production'
  DB_PATH = '/data/iocl_operations.db'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

[mounts]
  source = 'iocl_data'
  destination = '/data'
